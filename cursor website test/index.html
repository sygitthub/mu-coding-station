<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎来到沐的编程世界</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-start: #0f0c29;
      --bg-mid: #302b63;
      --bg-end: #24243e;
      --accent: #ff6b9d;
      --accent-alt: #c471ed;
      --text: #e8e6f0;
      --text-muted: #a8a4b8;
    }

    body {
      min-height: 100vh;
      font-family: 'Noto Serif SC', serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
      transition: background 0.8s ease;
    }

    /* 背景装饰 */
    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow-1 {
      top: -200px;
      left: -100px;
      background: var(--accent);
    }
    .bg-glow-2 {
      bottom: -200px;
      right: -100px;
      background: var(--accent-alt);
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 640px;
    }

    .subtitle {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 0.95rem;
      letter-spacing: 0.4em;
      color: var(--accent);
      margin-bottom: 1rem;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .hero-title-wrap {
      display: block;
      margin-bottom: 1.5rem;
      animation: titleBreathe 5s ease-in-out 2s infinite;
    }
    h1.hero-title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      line-height: 1.35;
      margin: 0;
      opacity: 0;
      background: linear-gradient(120deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 2s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes titleBreathe {
      0%, 88% { transform: translateY(0) scale(1); }
      92% { transform: translateY(0) scale(1.016); }
      96% { transform: translateY(0) scale(1.008); }
      100% { transform: translateY(0) scale(1); }
    }

    .desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    /* 会变色的按钮 */
    .magic-btn {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 2.2rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      color: #fff;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-alt) 100%);
      box-shadow: 0 8px 32px rgba(196, 113, 237, 0.35);
    }

    .magic-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a18cd1 100%);
      background-size: 200% 200%;
      border-radius: inherit;
      z-index: -1;
      animation: colorShift 4s ease infinite;
    }

    .magic-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(255, 107, 157, 0.45);
    }

    .magic-btn:active {
      transform: scale(0.98);
    }

    /* 探索次数计数器 */
    .explore-counter {
      margin-top: 2rem;
      text-align: center;
    }
    .explore-counter .label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.15em;
    }
    .explore-counter .count {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      text-shadow:
        0 0 10px rgba(255, 107, 157, 0.8),
        0 0 20px rgba(196, 113, 237, 0.6),
        0 0 30px rgba(255, 107, 157, 0.4);
      transition: text-shadow 0.3s ease;
    }
    .explore-counter .count.bump {
      animation: countGlow var(--bump-duration, 0.4s) ease;
    }
    @keyframes countGlow {
      50% {
        text-shadow:
          0 0 16px rgba(255, 107, 157, 1),
          0 0 32px rgba(196, 113, 237, 0.9),
          0 0 48px rgba(255, 107, 157, 0.6);
        transform: scale(var(--bump-scale, 1.08));
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes colorShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <p class="subtitle">Hello World</p>
    <div class="hero-title-wrap"><h1 class="hero-title">💗欢迎来到沐的编程世界💗</h1></div>
    <p class="desc">在这里探索代码的乐趣，用键盘敲出无限可能。</p>
    <button class="magic-btn" type="button" id="magicBtn">开始探索</button>
    <div class="explore-counter">
      <span class="label">探索次数</span>
      <span class="count" id="exploreCount">0</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script>
    (function () {
      var gradients = [
        ['#0f0c29', '#302b63', '#24243e'],
        ['#1a1a2e', '#16213e', '#0f3460'],
        ['#2d132c', '#801336', '#c72c41'],
        ['#0f2027', '#203a43', '#2c5364'],
        ['#232526', '#414345', '#000000'],
        ['#4a0e4e', '#2d1b69', '#11998e'],
        ['#ee0979', '#ff6a00', '#ff9a56'],
        ['#134e5e', '#71b280', '#2c3e50'],
        ['#360033', '#0b8793', '#360033'],
        ['#141e30', '#243b55', '#141e30']
      ];

      function randomHex() {
        return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
      }

      function randomGradient() {
        var a = randomHex();
        var b = randomHex();
        var c = randomHex();
        return [a, b, c];
      }

      var confettiPalette = ['#ff6b9d', '#c471ed', '#ff9a9e', '#a18cd1', '#fecfef', '#ffd89b', '#19547b', '#00d9ff', '#7b68ee', '#ff4757', '#2ed573', '#ffa502'];

      function setBackgroundGradient(colors) {
        var g = 'linear-gradient(135deg, ' + colors[0] + ' 0%, ' + colors[1] + ' 50%, ' + colors[2] + ' 100%)';
        document.body.style.background = g;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function fireConfettiAtButton(btn) {
        var rect = btn.getBoundingClientRect();
        var x = (rect.left + rect.width / 2) / window.innerWidth;
        var y = (rect.top + rect.height / 2) / window.innerHeight;

        if (typeof confetti !== 'function') return;

        var mainCount = Math.floor(randomBetween(80, 180));
        var mainSpread = randomBetween(50, 100);
        var colors = shuffle(confettiPalette).slice(0, 5 + Math.floor(Math.random() * 5));

        confetti({
          particleCount: mainCount,
          spread: mainSpread,
          origin: { x: x, y: y },
          colors: colors,
          startVelocity: randomBetween(20, 45),
          scalar: randomBetween(0.8, 1.3),
          drift: randomBetween(-0.5, 0.5)
        });

        var sideDelay = randomBetween(80, 280);
        var sideCount = Math.floor(randomBetween(40, 110));
        var sideSpread = randomBetween(40, 75);
        var angleLeft = randomBetween(45, 85);
        var angleRight = randomBetween(95, 135);
        var originOffset = randomBetween(0.1, 0.22);

        setTimeout(function () {
          confetti({
            particleCount: sideCount,
            angle: angleLeft,
            spread: sideSpread,
            origin: { x: x - originOffset, y: y },
            colors: colors,
            startVelocity: randomBetween(15, 35),
            scalar: randomBetween(0.7, 1.2)
          });
          confetti({
            particleCount: sideCount,
            angle: angleRight,
            spread: sideSpread,
            origin: { x: x + originOffset, y: y },
            colors: colors,
            startVelocity: randomBetween(15, 35),
            scalar: randomBetween(0.7, 1.2)
          });
          if (Math.random() > 0.5) {
            setTimeout(function () {
              confetti({
                particleCount: Math.floor(randomBetween(30, 70)),
                angle: 90,
                spread: randomBetween(60, 100),
                origin: { x: x, y: y + 0.05 },
                colors: colors,
                startVelocity: randomBetween(10, 25)
              });
            }, randomBetween(50, 150));
          }
        }, sideDelay);
      }

      var btn = document.getElementById('magicBtn');
      var countEl = document.getElementById('exploreCount');
      var count = 0;

      if (btn) {
        btn.addEventListener('click', function () {
          var colors = Math.random() > 0.3 ? gradients[Math.floor(Math.random() * gradients.length)] : randomGradient();
          var duration = randomBetween(0.5, 1.25);
          document.body.style.transition = 'background ' + duration + 's ease';
          setBackgroundGradient(colors);
          fireConfettiAtButton(btn);
          count += 1;
          if (countEl) {
            countEl.textContent = count;
            countEl.style.setProperty('--bump-scale', (1.05 + Math.random() * 0.12).toFixed(3));
            countEl.style.setProperty('--bump-duration', (0.28 + Math.random() * 0.32).toFixed(2) + 's');
            countEl.classList.remove('bump');
            countEl.offsetHeight;
            countEl.classList.add('bump');
          }
        });
      }
    })();
  </script>
</body>
</html>
